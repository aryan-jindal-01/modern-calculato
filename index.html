<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator | Gupta Ji</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <div class="calculator">

        <h2>Modern Calculator</h2>

        <input
            type="text"
            id="display"
            placeholder="Enter Calculation"
            readonly
        >

        <div class="buttons">

            <button class="orange" onclick="clearDisplay()">AC</button>
            <button class="orange" onclick="deleteLast()">DEL</button>
            <button class="orange" onclick="append('%')">%</button>
            <button class="orange" onclick="append('/')">÷</button>

            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button class="orange" onclick="append('*')">×</button>

            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button class="orange" onclick="append('-')">−</button>

            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button class="orange" onclick="append('+')">+</button>

            <button class="zero" onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>

            <button class="equal" onclick="calculate()">=</button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
